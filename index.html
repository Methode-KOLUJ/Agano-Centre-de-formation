<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site en Construction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#020617);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
}

.cone{
    width:180px;
    max-width:100%;
    margin-bottom:30px;
    animation:bounce 2s infinite ease-in-out;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    color:#cbd5e1;
    font-size:1.1rem;
    margin-bottom:40px;
    line-height:1.6;
}

.progress-container{
    width:100%;
    height:24px;
    background:rgba(255,255,255,.1);
    border-radius:50px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:75%;
    background:linear-gradient(90deg,#f59e0b,#f97316);
    border-radius:50px;
    animation:loading 3s infinite ease-in-out;
}

.progress-text{
    margin-top:15px;
    color:#f59e0b;
    font-weight:bold;
    letter-spacing:1px;
}

@keyframes loading{
    0%{width:20%;}
    50%{width:75%;}
    100%{width:20%;}
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}
</style>
</head>
<body>

<div class="container">

    <img
        class="cone"
        src="./public/Chantier.png"
        alt="Cône de chantier"
    >

    <h1>Mise à jour du site</h1>

    <p>
        Nous travaillons sur la mise à jour du site d'Agano Centre de Formation. <a href="https://aganoservicesconsultances.com" target="_blank">Cliquez ici</a>  pour en apprendre sur la société mère !
    </p>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <div class="progress-text">
        Travaux en cours...
    </div>

</div>

</body>
</html>
